<!DOCTYPE html>
<html>
<head>
  <title>Mario Lava Game!</title>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="400" style="border:1px solid black;"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player{
      x: 50,
      y: 130,
      widht: 30,
      height:30,
      speed: 5,
    };

    let enemy = {
      x: 200,
      y:170,
      width: 40,
      height: 40,
    };

    let ground ={
      x: 0,
      y: 300,
      width: canvas. width,
      height: 20,
    };

    //Flechas
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") player.x += player.speed;
      if (e.key === "ArrowLeft") player.x -= player.speed;
      if (e.key === "ArrowUp") player.y -= player.speed;
      if (e.key === "ArrowDown") player.y += player.speed;
    });

    //Colisión
    function collision (a,b){
      return(
        a.x < b.x + b.width &&
        a.x + a. width > b.x &&
        a.y < b.y + b. height &&
        a.y + a.height > b.y
        );
    }

    //Revisión suelo
    function onGround(player. ground){
      return(
        player.y + player. height >= player.y &&
        player.x + player.width > player.x &&
        player.x < ground.x + ground. width
        );
    }

    let gravity = 3;

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
   
    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

    ctx.fillStyle = "brown";
    ctx.fillRect(ground.x, ground.y, ground.width, ground.height);

    ctx.fillStyle = "pink";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    if (OnGround(player, ground)){
      player.y = ground.y - player.height;
    }
    else{
      player.y += gravity;
        if (player.y > canvas.height)
        {
          console. log ("Game Over")
    }
    }
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
